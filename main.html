<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TheRealm — KnightsOfNear | Where NEAR meets the Round Table</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cinzel+Decorative:wght@700&family=Source+Serif+4:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0d0a0c;
      --surface: #161214;
      --border: #2a2226;
      --muted: #8b7a82;
      --text: #ebe0e4;
      --gold: #c9a227;
      --gold-dim: #6b5a1a;
      --accent: #7b5ea8;
      --near: #00c08b;
      --radius: 6px;
      --font-display: 'Cinzel', serif;
      --font-deco: 'Cinzel Decorative', serif;
      --font-body: 'Source Serif 4', Georgia, serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      line-height: 1.65;
      min-height: 100vh;
      background-image:
        radial-gradient(ellipse 100% 60% at 50% -10%, rgba(201, 162, 39, 0.08) 0%, transparent 55%),
        radial-gradient(ellipse 80% 40% at 80% 60%, rgba(123, 94, 168, 0.06) 0%, transparent 50%);
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 1.5rem;
    }

    /* ----- Header ----- */
    header {
      padding: 3.5rem 0 2.5rem;
      text-align: center;
    }

    .logo {
      font-family: var(--font-deco);
      font-size: 2.4rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--gold);
      margin-bottom: 0.35rem;
      text-shadow: 0 0 24px rgba(201, 162, 39, 0.25);
    }

    .tagline {
      font-size: 1.05rem;
      color: var(--muted);
      font-style: italic;
      max-width: 42ch;
      margin: 0 auto 1.5rem;
    }

    .badge {
      display: inline-block;
      padding: 0.35rem 0.85rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      font-family: var(--font-display);
      font-size: 0.8rem;
      color: var(--gold);
      letter-spacing: 0.05em;
    }

    /* ----- Nav ----- */
    nav {
      padding: 0.9rem 0;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: rgba(13, 10, 12, 0.92);
      backdrop-filter: blur(10px);
      z-index: 10;
    }

    nav .wrap {
      display: flex;
      justify-content: center;
      align-items: center;
