<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TheRealm — KnightsOfNear | Where NEAR meets the Round Table</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cinzel+Decorative:wght@700&family=Source+Serif+4:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0d0a0c;
      --surface: #161214;
      --border: #2a2226;
      --muted: #8b7a82;
      --text: #ebe0e4;
      --gold: #c9a227;
      --gold-dim: #6b5a1a;
      --accent: #7b5ea8;
      --near: #00c08b;
      --radius: 6px;
      --font-display: 'Cinzel', serif;
      --font-deco: 'Cinzel Decorative', serif;
      --font-body: 'Source Serif 4', Georgia, serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      line-height: 1.65;
      min-height: 100vh;
      background-image:
        radial-gradient(ellipse 100% 60% at 50% -10%, rgba(201, 162, 39, 0.08) 0%, transparent 55%),
        radial-gradient(ellipse 80% 40% at 80% 60%, rgba(123, 94, 168, 0.06) 0%, transparent 50%);
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 1.5rem;
    }

    /* ----- Header ----- */
    header {
      padding: 3.5rem 0 2.5rem;
      text-align: center;
    }

    .logo {
      font-family: var(--font-deco);
      font-size: 2.4rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--gold);
      margin-bottom: 0.35rem;
      text-shadow: 0 0 24px rgba(201, 162, 39, 0.25);
    }

    .tagline {
      font-size: 1.05rem;
      color: var(--muted);
      font-style: italic;
      max-width: 42ch;
      margin: 0 auto 1.5rem;
    }

    .badge {
      display: inline-block;
      padding: 0.35rem 0.85rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      font-family: var(--font-display);
      font-size: 0.8rem;
      color: var(--gold);
      letter-spacing: 0.05em;
    }

    /* ----- Nav ----- */
    nav {
      padding: 0.9rem 0;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: rgba(13, 10, 12, 0.92);
      backdrop-filter: blur(10px);
      z-index: 10;
    }

    nav .wrap {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 2rem;
      flex-wrap: wrap;
    }

    nav a {
      color: var(--muted);
      text-decoration: none;
      font-family: var(--font-display);
      font-size: 0.9rem;
      transition: color 0.2s;
    }

    nav a:hover {
      color: var(--gold);
    }

    /* ----- Sections ----- */
    section {
      padding: 3rem 0;
    }

    section h2 {
      font-family: var(--font-display);
      font-size: 1.7rem;
      font-weight: 600;
      margin-bottom: 1rem;
      color: var(--text);
    }

    section p {
      color: var(--muted);
      margin-bottom: 1rem;
      max-width: 65ch;
    }

    .round-table-intro {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
      align-items: start;
      margin-top: 1.5rem;
    }

    @media (max-width: 700px) {
      .round-table-intro {
        grid-template-columns: 1fr;
      }
    }

    .round-table-intro .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
    }

    .round-table-intro .card h3 {
      font-family: var(--font-display);
      font-size: 1.1rem;
      color: var(--gold);
      margin-bottom: 0.5rem;
    }

    .round-table-intro .card p {
      margin: 0;
      font-size: 0.95rem;
    }

    /* ----- KOK Gallery ----- */
    .kok-gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1.25rem;
      margin-top: 1.5rem;
    }

    .kok-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .kok-card:hover {
      border-color: var(--gold-dim);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
    }

    .kok-card .thumb {
      height: 200px;
      background: linear-gradient(145deg, var(--border) 0%, var(--surface) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-deco);
      font-size: 3rem;
      color: var(--gold-dim);
    }

    .kok-card .info {
      padding: 1rem;
    }

    .kok-card .name {
      font-family: var(--font-display);
      font-size: 1rem;
      color: var(--text);
      margin-bottom: 0.25rem;
    }

    .kok-card .desc {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 0.5rem;
      line-height: 1.4;
    }

    .kok-card .rarity {
      display: inline-block;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .rarity-legendary { background: rgba(201, 162, 39, 0.2); color: var(--gold); }
    .rarity-epic { background: rgba(123, 94, 168, 0.25); color: var(--accent); }
    .rarity-rare { background: rgba(0, 192, 139, 0.15); color: var(--near); }
    .rarity-uncommon { background: rgba(139, 122, 130, 0.2); color: var(--muted); }
    .rarity-common { background: rgba(43, 34, 38, 0.8); color: var(--text); }

    /* ----- Token info ----- */
    .token-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin-top: 1rem;
    }

    .token-stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      min-width: 140px;
    }

    .token-stat .label {
      font-size: 0.8rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.25rem;
    }

    .token-stat .value {
      font-family: var(--font-display);
      font-size: 1.1rem;
      color: var(--gold);
    }

    /* ----- CTA ----- */
    .cta-block {
      text-align: center;
      padding: 2.5rem 1.5rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-top: 2rem;
    }

    .cta-block h3 {
      font-family: var(--font-display);
      font-size: 1.3rem;
      color: var(--text);
      margin-bottom: 0.5rem;
    }

    .cta-block p {
      margin: 0 auto 1.25rem;
      max-width: 40ch;
    }

    .btn {
      display: inline-block;
      padding: 0.7rem 1.5rem;
      background: transparent;
      border: 1px solid var(--gold);
      border-radius: var(--radius);
      color: var(--gold);
      font-family: var(--font-display);
      font-size: 0.95rem;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .btn:hover {
      background: var(--gold);
      color: var(--bg);
    }

    /* ----- Footer ----- */
    footer {
      padding: 2rem 0;
      border-top: 1px solid var(--border);
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
    }

    footer a {
      color: var(--gold);
      text-decoration: none;
    }

    footer a:hover {
      text-decoration: underline;
    }

    /* ----- Round table visual ----- */
    .table-visual {
      width: 100%;
      max-width: 500px;
      height: 180px;
      margin: 1.5rem auto;
      background: radial-gradient(ellipse 80% 70% at 50% 50%, var(--surface) 0%, var(--bg) 70%);
      border: 2px solid var(--gold-dim);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-deco);
      font-size: 1.2rem;
      color: var(--gold-dim);
      letter-spacing: 0.1em;
    }

    /* ----- Accordion for FAQ ----- */
    .faq-list {
      margin-top: 1rem;
    }

    .faq-item {
      border-bottom: 1px solid var(--border);
    }

    .faq-item summary {
      padding: 1rem 0;
      font-family: var(--font-display);
      font-size: 1rem;
      color: var(--text);
      cursor: pointer;
      list-style: none;
    }

    .faq-item summary::-webkit-details-marker {
      display: none;
    }

    .faq-item summary::after {
      content: "+";
      float: right;
      color: var(--gold);
    }

    .faq-item[open] summary::after {
      content: "−";
    }

    .faq-item .content {
      padding: 0 0 1rem;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .hero-stats {
      display: flex;
      justify-content: center;
      gap: 2rem;
      flex-wrap: wrap;
      margin-top: 2rem;
    }

    .hero-stat {
      text-align: center;
    }

    .hero-stat .num {
      font-family: var(--font-deco);
      font-size: 1.8rem;
      color: var(--gold);
    }

    .hero-stat .lbl {
      font-size: 0.8rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .gate-list {
      list-style: none;
      margin-top: 1rem;
    }

    .gate-list li {
      padding: 0.5rem 0;
      border-bottom: 1px solid var(--border);
